[build]
  base    = "newsdetection"
  publish = "newsdetection/dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# ── Proxy /api/* → Render backend ──
[[redirects]]
  from   = "/api/*"
  to     = "https://truthscannai-vqii.onrender.com/api/:splat"
  status = 200
  force  = true

# ── SPA fallback — must be LAST ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
