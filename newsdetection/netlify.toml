[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://truthscanai-vqij.onrender.com"

# SPA client-side routing — serve index.html for all paths
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
